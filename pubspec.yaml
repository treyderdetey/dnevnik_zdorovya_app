name: dnevnik_zdorovya
description: "Ассистент Здоровья – здоровье, цикл & напоминание о лекарствах"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # UI Components
  table_calendar: ^3.1.2
  fl_chart: ^0.69.0
  smooth_page_indicator: ^1.2.0+3
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1

  # Premium UI
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  confetti: ^0.7.0
  flutter_staggered_animations: ^1.1.1
  curved_navigation_bar: ^1.0.6
  emoji_picker_flutter: ^2.1.1
  syncfusion_flutter_gauges: ^33.1.47

  # PDF Export
  pdf: ^3.11.1
  printing: ^5.13.3
  path_provider: ^2.1.5

  # Phone & URL launcher
  url_launcher: ^6.3.1

  # Localization
  flutter_localizations:
    sdk: flutter

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.0
  package_info_plus: ^8.0.0

  # Future: Ads & Analytics
  # google_mobile_ads: ^5.1.0
  # firebase_core: ^3.8.0
  # firebase_analytics: ^11.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/launcher_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/launcher_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/

